<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cafe Staff</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cafe-wrapper">
    <div class="cafe-stage">

        <!-- Background -->
        <img src="assets/background/cafe.png" alt="Cafe Background" class="cafe-bg">

        <!-- Characters -->
        <div class="cafe-char leader" data-id="HERMAN">
            <img src="assets/characters/leader.png" alt="Herman">
        </div>

        <div class="cafe-char staff1" data-id="ACIN">
            <img src="assets/characters/assistant.png" alt="Acin">
        </div>

        <div class="cafe-char staff2" data-id="HARI">
            <img src="assets/characters/waiter.png" alt="Hari">
        </div>

    </div>
</div>

</body>
</html>
